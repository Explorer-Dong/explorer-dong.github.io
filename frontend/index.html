<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer Dong's Homepage</title>
    <link rel="icon" href="assets/bulb.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css">
    <script>
        (function () {
            var stored = localStorage.getItem('theme');
            if (stored === 'dark' || stored === 'light') {
                document.documentElement.setAttribute('data-theme', stored);
            }
            document.documentElement.classList.add('no-transition');
        })();
    </script>
</head>

<body>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-system" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
    </button>

    <main>
        <header>
            <p class="intro">你好，这里是我的个人主页。</p>
        </header>

        <section class="sites">
            <h2>我目前专注于维护以下网站：</h2>
            <div class="card-list">
                <a href="https://wiki.dwj601.cn/index.html" class="card">
                    <span class="card-title">开放 CS/AI 知识库</span>
                    <span class="card-desc">wiki.dwj601.cn</span>
                </a>
                <a href="https://blog.dwj601.cn/index.html" class="card">
                    <span class="card-title">个人博客</span>
                    <span class="card-desc">blog.dwj601.cn</span>
                </a>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 Explorer Dong</p>
            <div class="footer-links">
                <a href="https://stats.uptimerobot.com/uDFPc6P9Xc">服务状态</a>
                <span class="separator">&middot;</span>
                <a href="https://github.com/Explorer-Dong/explorer-dong.github.io">代码仓库</a>
                <span class="separator">&middot;</span>
                <a href="mailto:explorer-dong@foxmail.com">站长邮箱</a>
            </div>
        </footer>
    </main>

    <script src="assets/scripts.js"></script>
</body>

</html>
